grafana:
  adminPassword: "changeme"
  plugins:
    - grafana-llm-app
  resources:
    requests:
      cpu: "200m"
      memory: "256Mi"
    limits:
      cpu: "1"
      memory: "512Mi"

  additionalDataSources:
    - name: Loki
      type: loki
      url: http://loki.monitoring.svc.cluster.local:3100
      access: proxy

  persistence:
    enabled: true
    storageClassName: local-path
    size: 5Gi

  ingress:
    enabled: true
    ingressClassName: nginx
    hosts:
      - grafana.home
    paths:
      - /

  # Pre-load the NVIDIA DCGM dashboard
  dashboardProviders:
    dashboardproviders.yaml:
      apiVersion: 1
      providers:
        - name: default
          orgId: 1
          folder: ""
          type: file
          disableDeletion: false
          options:
            path: /var/lib/grafana/dashboards/default

  dashboards:
    default:
      nvidia-dcgm:
        gnetId: 12239
        revision: 2
        datasource: Prometheus
      node-exporter:
        gnetId: 1860
        revision: 37
        datasource: Prometheus
      kubernetes-cluster:
        gnetId: 7249
        revision: 1
        datasource: Prometheus

prometheus:
  prometheusSpec:
    retention: 15d
    resources:
      requests:
        cpu: "500m"
        memory: "1Gi"
      limits:
        cpu: "2"
        memory: "3Gi"
    securityContext:
      runAsUser: 0
      runAsNonRoot: false
      fsGroup: 0
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: local-path
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 20Gi
    # Scrape all ServiceMonitors across namespaces
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false
    ruleSelectorNilUsesHelmValues: false

alertmanager:
  alertmanagerSpec:
    resources:
      requests:
        cpu: "50m"
        memory: "64Mi"
      limits:
        cpu: "200m"
        memory: "128Mi"
    storage:
      volumeClaimTemplate:
        spec:
          storageClassName: local-path
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 2Gi

  config:
    global:
      resolve_timeout: 5m
      smtp_smarthost: "smtp.gmail.com:587"
      smtp_from: "your@email.com"
      smtp_auth_username: "your@email.com"
      smtp_auth_password: "your-gmail-app-password"
      smtp_require_tls: true
    route:
      group_by: ["alertname", "namespace"]
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
      receiver: email
      routes:
        - receiver: email
          matchers:
            - alertname =~ ".*"
        - receiver: incident-commander
          continue: true
          matchers:
            - alertname =~ ".*"
    receivers:
      - name: email
        email_configs:
          - to: "your@email.com"
            send_resolved: true
            headers:
              Subject: '[{{ .Status | toUpper }}] {{ .CommonLabels.alertname }}'
            text: |
              {{ range .Alerts }}
              Alert: {{ .Annotations.summary }}
              Details: {{ .Annotations.description }}
              Status: {{ .Status }}
              {{ end }}
      - name: incident-commander
        webhook_configs:
          # Replace REPLACE_WITH_WEBHOOK_SECRET with the value from:
          # kubectl get secret webhook-credentials -n incident-commander -o jsonpath='{.data.secret}' | base64 -d
          - url: "https://incident.home/webhooks/alertmanager?secret=REPLACE_WITH_WEBHOOK_SECRET"
            send_resolved: true

# node-exporter runs on every node — needs privileged to access host metrics
nodeExporter:
  enabled: true

kube-state-metrics:
  enabled: true
