apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: loki
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://grafana.github.io/helm-charts
    chart: loki
    targetRevision: "6.*"
    helm:
      valuesObject:
        deploymentMode: SingleBinary

        loki:
          commonConfig:
            replication_factor: 1
          storage:
            type: filesystem
          schemaConfig:
            configs:
              - from: "2024-01-01"
                store: tsdb
                object_store: filesystem
                schema: v13
                index:
                  prefix: loki_index_
                  period: 24h
          limits_config:
            retention_period: 168h   # 7 days
            ingestion_rate_mb: 4
            ingestion_burst_size_mb: 6
          compactor:
            working_directory: /var/loki/compactor
            retention_enabled: true
            retention_delete_delay: 2h
            delete_request_store: filesystem

        singleBinary:
          replicas: 1
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          persistence:
            enabled: true
            storageClass: local-path
            size: 10Gi
          nodeSelector:
            node-role.kubernetes.io/worker: ""

        # Disable scalable-mode components
        backend:
          replicas: 0
        read:
          replicas: 0
        write:
          replicas: 0

        # Disable extras not needed in homelab
        gateway:
          enabled: false
        lokiCanary:
          enabled: false
        test:
          enabled: false

  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
