apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cert-manager-pki
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/raghavendrak89/home_lab.git
    targetRevision: main
    path: kubernetes/cert-manager
  destination:
    server: https://kubernetes.default.svc
    namespace: cert-manager
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - SkipDryRunOnMissingResource=true
