apiVersion: v1
data:
  index.html: "<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n  <meta charset=\"UTF-8\">\n
    \ <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n
    \ <title>Linux Learning Lab \U0001F427</title>\n  <style>\n    * { box-sizing:
    border-box; margin: 0; padding: 0; }\n    :root {\n      --bg: #0d1117; --surface:
    #161b22; --border: #30363d;\n      --green: #3fb950; --blue: #58a6ff; --yellow:
    #d29922;\n      --red: #f85149; --purple: #bc8cff; --text: #e6edf3;\n      --muted:
    #8b949e; --tbg: #010409; --pgreen: #39d353;\n    }\n    body { background:var(--bg);
    color:var(--text); font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    min-height:100vh; display:flex; flex-direction:column; }\n    header { background:var(--surface);
    border-bottom:1px solid var(--border); padding:14px 24px; display:flex; align-items:center;
    gap:16px; }\n    header h1 { font-size:1.2em; color:var(--green); white-space:nowrap;
    }\n    .prog-bar { flex:1; height:6px; background:var(--border); border-radius:3px;
    overflow:hidden; }\n    .prog-fill { height:100%; background:var(--green); width:0%;
    transition:width .5s; }\n    .score-badge { background:var(--surface); border:1px
    solid var(--border); padding:4px 12px; border-radius:20px; font-size:.85em; color:var(--yellow);
    white-space:nowrap; }\n    .tabs { display:flex; background:var(--surface); border-bottom:1px
    solid var(--border); padding:0 24px; }\n    .tab { padding:12px 20px; cursor:pointer;
    font-size:.9em; color:var(--muted); border-bottom:2px solid transparent; transition:all
    .2s; user-select:none; }\n    .tab.active { color:var(--text); border-bottom-color:var(--blue);
    }\n    .pane { display:none; flex:1; padding:20px 24px; max-width:1100px; margin:0
    auto; width:100%; flex-direction:column; gap:16px; }\n    .pane.active { display:flex;
    }\n    select { background:var(--surface); border:1px solid var(--border); color:var(--text);
    padding:7px 12px; border-radius:8px; font-size:.88em; cursor:pointer; }\n    .btn
    { padding:7px 18px; border:none; border-radius:8px; cursor:pointer; font-size:.88em;
    font-weight:600; transition:all .2s; }\n    .btn-g { background:var(--green);
    color:#000; }\n    .btn-g:hover { opacity:.85; }\n    .btn-b { background:var(--blue);
    color:#000; }\n    .btn-b:hover { opacity:.85; }\n    .btn-gh { background:transparent;
    border:1px solid var(--border); color:var(--text); }\n    .btn-gh:hover { background:var(--border);
    }\n    .btn:disabled { opacity:.4; cursor:not-allowed; }\n    .row { display:flex;
    gap:10px; flex-wrap:wrap; align-items:center; }\n    .card { background:var(--surface);
    border:1px solid var(--border); border-radius:12px; padding:20px; }\n    .tag
    { padding:3px 9px; border-radius:12px; font-size:.72em; font-weight:700; text-transform:uppercase;
    }\n    .tag-mod { background:#1f3a5f; color:var(--blue); }\n    .tag-easy { background:#1a3a2a;
    color:var(--green); }\n    .tag-med  { background:#3a2a1a; color:var(--yellow);
    }\n    .tag-hard { background:#3a1a1a; color:var(--red); }\n    #qText { font-size:1.05em;
    line-height:1.7; margin-top:10px; }\n    #qCtx  { font-size:.83em; color:var(--muted);
    margin-top:6px; font-style:italic; }\n    .hint { margin-top:10px; padding:9px
    13px; background:#0d1117; border-left:3px solid var(--yellow); font-size:.83em;
    color:var(--yellow); display:none; }\n    .ans { width:100%; background:var(--tbg);
    border:1px solid var(--border); color:var(--text); padding:13px; border-radius:8px;
    font-family:'Courier New',monospace; font-size:.92em; resize:vertical; min-height:110px;
    line-height:1.55; }\n    .ans:focus { outline:none; border-color:var(--blue);
    }\n    .res { padding:18px; border-radius:12px; border:1px solid; }\n    .res.ok
    \ { background:#0d2a1a; border-color:var(--green); }\n    .res.mid { background:#2a2a0d;
    border-color:var(--yellow); }\n    .res.bad { background:#2a0d0d; border-color:var(--red);
    }\n    #resScore { font-size:1.9em; font-weight:700; margin-bottom:8px; }\n    #resExp
    { font-size:.88em; line-height:1.75; }\n    #resExp code { background:var(--tbg);
    padding:1px 5px; border-radius:3px; font-family:monospace; color:var(--green);
    }\n    .term-wrap { background:var(--tbg); border-radius:12px; overflow:hidden;
    border:1px solid var(--border); display:flex; flex-direction:column; min-height:480px;
    }\n    .term-bar { background:#21262d; padding:9px 14px; display:flex; align-items:center;
    gap:7px; }\n    .dot { width:11px; height:11px; border-radius:50%; }\n    .dr
    { background:#ff5f57; } .dy { background:#febc2e; } .dg { background:#28c840;
    }\n    .term-title { margin-left:6px; font-size:.78em; color:var(--muted); font-family:monospace;
    }\n    .term-out { flex:1; padding:14px; font-family:'Courier New',monospace;
    font-size:.88em; line-height:1.65; overflow-y:auto; white-space:pre-wrap; word-break:break-word;
    }\n    .tl { margin-bottom:1px; }\n    .tp { color:var(--pgreen); }\n    .ti {
    color:var(--blue); }\n    .tw { color:var(--yellow); }\n    .te { color:var(--red);
    }\n    .ts { color:var(--green); }\n    .tm { color:var(--muted); }\n    .term-in-row
    { display:flex; align-items:center; padding:7px 14px; border-top:1px solid #21262d;
    gap:7px; }\n    .term-in-p { color:var(--pgreen); font-family:monospace; white-space:nowrap;
    font-size:.88em; }\n    .term-in { flex:1; background:transparent; border:none;
    color:var(--text); font-family:'Courier New',monospace; font-size:.88em; outline:none;
    }\n    .chal { background:#1a1f2e; border:1px solid #1f3a5f; border-radius:8px;
    padding:13px 17px; }\n    .chal h3 { color:var(--blue); font-size:.88em; margin-bottom:5px;
    }\n    .chal p { font-size:.83em; line-height:1.5; }\n    .chal .ch { font-size:.78em;
    color:var(--muted); margin-top:5px; }\n    .spin { display:inline-block; width:13px;
    height:13px; border:2px solid var(--border); border-top-color:var(--blue); border-radius:50%;
    animation:sp .7s linear infinite; vertical-align:middle; margin-right:6px; }\n
    \   @keyframes sp { to { transform:rotate(360deg); } }\n    .topics { display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:12px; }\n    .tc
    { background:var(--surface); border:1px solid var(--border); border-radius:10px;
    padding:15px; cursor:pointer; transition:all .2s; }\n    .tc:hover { border-color:var(--blue);
    background:#1f2d3d; }\n    .tc h4 { color:var(--blue); margin-bottom:5px; }\n
    \   .tc li { font-size:.78em; color:var(--muted); margin-left:14px; margin-top:3px;
    }\n    .tc .go { font-size:.75em; color:var(--blue); margin-top:9px; }\n  </style>\n</head>\n<body>\n<header>\n
    \ <h1>\U0001F427 Linux Learning Lab</h1>\n  <div class=\"prog-bar\"><div class=\"prog-fill\"
    id=\"pf\"></div></div>\n  <div class=\"score-badge\">⭐ <span id=\"pts\">0</span>
    pts | Q: <span id=\"qct\">0</span></div>\n</header>\n<div class=\"tabs\">\n  <div
    class=\"tab active\" onclick=\"sw('quiz')\">\U0001F4DA Quiz</div>\n  <div class=\"tab\"
    onclick=\"sw('term')\">\U0001F4BB Terminal</div>\n  <div class=\"tab\" onclick=\"sw('topics')\">\U0001F5FA️
    Topics</div>\n</div>\n\n<!-- QUIZ PANE -->\n<div class=\"pane active\" id=\"pane-quiz\">\n
    \ <div class=\"row\">\n    <select id=\"mod\">\n      <option value=\"networking\">\U0001F310
    Networking</option>\n      <option value=\"storage\">\U0001F4BE Storage &amp;
    LVM</option>\n      <option value=\"security\">\U0001F512 Security &amp; Hardening</option>\n
    \     <option value=\"systemd\">⚙️ systemd &amp; Processes</option>\n      <option
    value=\"shell\">⚡ Shell &amp; Scripting</option>\n      <option value=\"random\">\U0001F3B2
    Random</option>\n    </select>\n    <select id=\"diff\">\n      <option value=\"intermediate\">\U0001F7E1
    Intermediate</option>\n      <option value=\"beginner\">\U0001F7E2 Beginner</option>\n
    \     <option value=\"advanced\">\U0001F534 Advanced</option>\n    </select>\n
    \   <button class=\"btn btn-g\" id=\"genBtn\" onclick=\"genQ()\">Generate Question
    →</button>\n  </div>\n\n  <div class=\"card\" id=\"qCard\" style=\"display:none\">\n
    \   <div class=\"row\" id=\"qMeta\" style=\"gap:6px\"></div>\n    <div id=\"qText\"></div>\n
    \   <div id=\"qCtx\"></div>\n    <div class=\"hint\" id=\"hint\"></div>\n    <button
    class=\"btn btn-gh\" style=\"margin-top:10px;font-size:.78em\" onclick=\"toggleHint()\">\U0001F4A1
    Show hint</button>\n  </div>\n\n  <div id=\"ansWrap\" style=\"display:none\">\n
    \   <textarea class=\"ans\" id=\"ans\" placeholder=\"Type your answer... commands,
    explanations, examples all welcome.&#10;&#10;The more detail the better — Ollama
    will grade and explain.\"></textarea>\n    <div class=\"row\" style=\"margin-top:9px\">\n
    \     <button class=\"btn btn-b\" id=\"subBtn\" onclick=\"grade()\">Check Answer
    ✓</button>\n      <button class=\"btn btn-gh\" onclick=\"genQ()\">Skip →</button>\n
    \   </div>\n  </div>\n\n  <div id=\"resWrap\" style=\"display:none\">\n    <div
    class=\"res\" id=\"res\">\n      <div id=\"resScore\"></div>\n      <div id=\"resExp\"></div>\n
    \   </div>\n    <button class=\"btn btn-g\" style=\"margin-top:10px\" onclick=\"genQ()\">Next
    Question →</button>\n  </div>\n</div>\n\n<!-- TERMINAL PANE -->\n<div class=\"pane\"
    id=\"pane-term\">\n  <div class=\"chal\" id=\"chalBox\">\n    <h3>\U0001F3AF Challenge
    <span id=\"chalNum\">1</span> of 12</h3>\n    <p id=\"chalText\"></p>\n    <p
    class=\"ch\" id=\"chalHint\"></p>\n  </div>\n  <div class=\"term-wrap\">\n    <div
    class=\"term-bar\">\n      <div class=\"dot dr\"></div><div class=\"dot dy\"></div><div
    class=\"dot dg\"></div>\n      <span class=\"term-title\">learner@linux-lab:~</span>\n
    \     <button class=\"btn btn-gh\" style=\"margin-left:auto;font-size:.72em;padding:3px
    9px\" onclick=\"clrTerm()\">clear</button>\n      <button class=\"btn btn-gh\"
    style=\"font-size:.72em;padding:3px 9px\" onclick=\"nextChal()\">Next Challenge
    →</button>\n    </div>\n    <div class=\"term-out\" id=\"tout\"></div>\n    <div
    class=\"term-in-row\">\n      <span class=\"term-in-p\" id=\"termPrompt\">learner@linux-lab:~$</span>\n
    \     <input class=\"term-in\" id=\"tin\" placeholder=\"type a command...\" onkeydown=\"tkey(event)\"
    autocomplete=\"off\" spellcheck=\"false\">\n    </div>\n  </div>\n</div>\n\n<!--
    TOPICS PANE -->\n<div class=\"pane\" id=\"pane-topics\">\n  <h2 style=\"color:var(--blue)\">\U0001F4DA
    Your Learning Path</h2>\n  <p style=\"color:var(--muted);font-size:.88em\">Click
    any topic to start a quiz on it.</p>\n  <div class=\"topics\" id=\"topGrid\"></div>\n</div>\n\n<script>\n//
    ── State ──────────────────────────────────────────────────\nlet score=0, qct=0,
    hintOn=false, curQ=null, histIdx=-1, hist=[], cwd='/home/learner', chalIdx=0;\n\nconst
    chals = [\n  {t:'Show all TCP ports currently listening, including which process
    owns each port.',h:'Try: ss -tlnp'},\n  {t:'Display the routing table. What is
    the default gateway and which interface does it use?',h:'Try: ip route show'},\n
    \ {t:'Show all block devices and their sizes in a tree view. Identify which are
    LVM members.',h:'Try: lsblk'},\n  {t:'Display disk usage for all mounted filesystems
    in human-readable format.',h:'Try: df -h'},\n  {t:'Find all files with the SUID
    permission bit set inside /usr/bin.',h:'Try: find /usr/bin -perm -4000 -type f'},\n
    \ {t:'Show who is logged in and what they are doing right now.',h:'Try: w  or
    \ who'},\n  {t:'Display the last 10 login records for all users.',h:'Try: last
    -10'},\n  {t:'Show the SSH daemon service status and whether it is enabled at
    boot.',h:'Try: systemctl status sshd'},\n  {t:'List all physical volumes, volume
    groups, and logical volumes on this system.',h:'Try: pvs && vgs && lvs'},\n  {t:'Show
    all currently active firewall rules in verbose format.',h:'Try: iptables -L -n
    -v'},\n  {t:'Find files larger than 100MB, excluding other filesystem mounts.',h:'Try:
    find / -xdev -size +100M -type f 2>/dev/null'},\n  {t:'Show the journal logs for
    the SSH service, most recent first.',h:'Try: journalctl -u sshd -r'},\n];\n\nconst
    topics = [\n  {icon:'\U0001F310',name:'Networking',mod:'networking',items:['ip
    addr / ip route','ss / netstat -tulpn','DNS: dig, resolv.conf, /etc/hosts','SSH
    keys & tunneling (-L, -R, -D)','iptables / nftables chains','tcpdump packet capture']},\n
    \ {icon:'\U0001F4BE',name:'Storage & LVM',mod:'storage',items:['lsblk, fdisk -l,
    parted','df -h vs du -sh','PV → VG → LV workflow','Creating & extending LVs','/etc/fstab
    & UUID mounts','ext4, xfs, btrfs differences']},\n  {icon:'\U0001F512',name:'Security',mod:'security',items:['chmod
    / SUID / sticky bit','sudo & /etc/sudoers','SSH hardening (sshd_config)','last,
    lastb, w, who, auditd','fail2ban rules & jails','SELinux / AppArmor basics']},\n
    \ {icon:'⚙️',name:'systemd',mod:'systemd',items:['Unit files & [Service] section','systemctl
    enable/start/mask','journalctl -u / -p / --since','Timers as cron replacement','cgroup
    resource limits','systemd-analyze blame']},\n  {icon:'⚡',name:'Shell & Scripting',mod:'shell',items:['Pipes
    | and redirects > >>','grep -E, sed s///, awk -F','Bash functions & error handling','trap
    for cleanup on exit','Here docs & process subs','xargs & parallel']},\n  {icon:'\U0001F50D',name:'Processes',mod:'systemd',items:['ps
    aux, top, htop','kill signals: HUP TERM KILL','lsof -i / -p','strace -p for debugging','/proc/PID
    internals','nice & ionice priority']},\n];\n\n// ── Simulated filesystem ───────────────────────────────────\nconst
    FS = {\n  '/home/learner':['docs/','scripts/','.bashrc','.ssh/'],\n  '/home/learner/docs':['networking.md','lvm-notes.txt','security-checklist.md'],\n
    \ '/home/learner/scripts':['backup.sh','monitor.sh','deploy.sh'],\n  '/home/learner/.ssh':['authorized_keys','config','id_ed25519.pub'],\n
    \ '/etc':['passwd','hostname','hosts','resolv.conf','fstab','ssh/','sudoers','crontab','os-release'],\n
    \ '/etc/ssh':['sshd_config','ssh_config'],\n  '/var':['log/','lib/','run/','tmp/'],\n
    \ '/var/log':['syslog','auth.log','kern.log','dpkg.log'],\n  '/proc':['cpuinfo','meminfo','mounts','net/','sys/','1/','1234/'],\n};\nconst
    FC = {\n  '/etc/resolv.conf':'nameserver 192.168.0.10\\nnameserver 1.1.1.1\\nsearch
    home',\n  '/etc/hostname':'linux-lab',\n  '/etc/hosts':'127.0.0.1   localhost\\n127.0.1.1
    \  linux-lab\\n192.168.0.201  k8s.home\\n192.168.0.10   pihole.home',\n  '/etc/fstab':'#
    <fs>           <mp>    <type>  <opts>          <d> <p>\\nUUID=a1b2c3d4    /       ext4
    \   defaults,noatime 0   1\\nUUID=e5f6a7b8    /boot   ext4    defaults         0
    \  2\\n/dev/vg0/data    /data   xfs     defaults         0   2\\ntmpfs            /tmp
    \   tmpfs   size=1G          0   0',\n  '/etc/os-release':'NAME=\"Debian GNU/Linux\"\\nVERSION=\"12
    (bookworm)\"\\nID=debian\\nPRETTY_NAME=\"Debian GNU/Linux 12 (bookworm)\"',\n
    \ '/home/learner/.bashrc':'export PATH=\"$HOME/scripts:$PATH\"\\nalias ll=\\'ls
    -alh --color=auto\\'\\nalias k=\\'kubectl\\'\\nPS1=\\'\\\\[\\\\033[01;32m\\\\]\\\\u@\\\\h\\\\[\\\\033[00m\\\\]:\\\\[\\\\033[01;34m\\\\]\\\\w\\\\[\\\\033[00m\\\\]\\\\$
    \\'',\n  '/proc/meminfo':'MemTotal:       16384000 kB\\nMemFree:         8194000
    kB\\nMemAvailable:   10243000 kB\\nSwapTotal:       4096000 kB\\nSwapFree:        4096000
    kB',\n  '/proc/cpuinfo':'processor\\t: 0\\nmodel name\\t: Intel(R) Core(TM) i7-12700
    @ 2.10GHz\\ncpu cores\\t: 12\\ncache size\\t: 25600 KB',\n};\n\n// ── Command
    Handlers ───────────────────────────────────────\nconst CMDS = {\nhelp:()=>`<span
    class=\"ti\">Linux Lab — available commands</span>\n\n  <span class=\"ts\">Navigate:</span>
    \ ls, cd, pwd, cat, find, grep, head, tail, wc\n  <span class=\"ts\">Network:</span>
    \  ip addr|route|neigh, ss, netstat, ping, dig, nslookup, curl, ssh, tcpdump\n
    \ <span class=\"ts\">Storage:</span>   df, du, lsblk, mount, blkid, fdisk, pvs,
    vgs, lvs, lvdisplay\n  <span class=\"ts\">Security:</span>  chmod, chown, id,
    sudo, last, lastb, who, w, find -perm, iptables, ss -tlnp\n  <span class=\"ts\">Process:</span>
    \  ps, kill, lsof, lsmod, systemctl, journalctl, top, free, uptime\n  <span class=\"ts\">System:</span>
    \   uname, hostname, env, date, history, clear, whoami\n\n  <span class=\"tw\">Special:</span>
    \  <span class=\"ti\">man &lt;cmd&gt;</span>  or  <span class=\"ti\">explain &lt;topic&gt;</span>
    \ →  Ollama explains it live\n             <span class=\"ti\">challenge</span>
    \ →  next terminal challenge`,\n\npwd:()=>cwd,\nwhoami:()=>'learner',\nhostname:()=>'linux-lab',\ndate:()=>new
    Date().toString(),\nid:()=>'uid=1000(learner) gid=1000(learner) groups=1000(learner),27(sudo),4(adm)',\nuname:(a)=>a.includes('-a')?'Linux
    linux-lab 6.1.0-21-amd64 #1 SMP PREEMPT_DYNAMIC Debian 6.1.90-1 x86_64 GNU/Linux':a.includes('-r')?'6.1.0-21-amd64':a.includes('-n')?'linux-lab':'Linux',\nuptime:()=>`
    ${new Date().toTimeString().slice(0,5)} up 12 days,  3:47,  2 users,  load average:
    0.12, 0.18, 0.14`,\nfree:(a)=>a.includes('-h')?\n`              total        used
    \       free      shared  buff/cache   available\nMem:           15Gi        4.2Gi
    \      7.8Gi       312Mi       3.0Gi        10Gi\nSwap:         4.0Gi          0B
    \      4.0Gi`:\n`              total        used        free      shared  buff/cache
    \  available\nMem:        16777216     4302848     7995392      319488     2478976
    \   10682368\nSwap:        4194304           0     4194304`,\nenv:()=>`HOME=/home/learner\\nUSER=learner\\nSHELL=/bin/bash\\nPATH=/home/learner/scripts:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin\\nTERM=xterm-256color\\nLANG=en_US.UTF-8`,\nhistory:()=>hist.slice(-15).map((c,i)=>`
    \ ${String(hist.length-14+i).padStart(3)}  ${c}`).join('\\n'),\necho:(a)=>a.replace(/^[\"']|[\"']$/g,''),\nclear:()=>{clrTerm();return
    null;},\nexit:()=>`<span class=\"tw\">You can't exit the lab! Keep learning \U0001F427</span>`,\n\nls:(a)=>{\n
    \ const long=a.match(/-[a-z]*l/)||a.includes('--long');\n  const all=a.match(/-[a-z]*a/);\n
    \ const parts=a.trim().split(/\\s+/).filter(p=>!p.startsWith('-'));\n  let dir=cwd;\n
    \ if(parts.length&&parts[0]){dir=parts[0].startsWith('/')?parts[0]:cwd+'/'+parts[0];}\n
    \ dir=dir.replace(/\\/+/g,'/').replace(/\\/$/,'')||'/';\n  const ent=FS[dir]||FS[cwd]||[];\n
    \ if(long){return ent.map(e=>{const d=e.endsWith('/');const n=e.replace('/','');return`${d?'drwxr-xr-x':'-rw-r--r--'}
    1 learner learner ${d?'4096':String(~~(Math.random()*8000+500)).padStart(5)} Jun
    18 10:00 <span class=\"${d?'ti':''}\">${n}</span>`;}).join('\\n');}\n  return
    ent.map(e=>{const d=e.endsWith('/');const n=e.replace('/','');return d?`<span
    class=\"ti\">${n}/</span>`:n;}).join('  ');\n},\n\ncd:(a)=>{const t=a.trim()||'/home/learner';cwd=(t.startsWith('/')?t:cwd+'/'+t).replace(/\\/+/g,'/').replace(/\\/$/,'')||'/';document.getElementById('termPrompt').textContent=`learner@linux-lab:${cwd}$`;return
    '';},\n\ncat:(a)=>{\n  const p=(a.trim().startsWith('/')?a.trim():cwd+'/'+a.trim()).replace(/\\/+/g,'/');\n
    \ if(p.includes('shadow'))return`<span class=\"te\">cat: /etc/shadow: Permission
    denied</span>`;\n  if(p.includes('sudoers')&&!a.startsWith('sudo'))return`<span
    class=\"te\">cat: /etc/sudoers: Permission denied</span>`;\n  return FC[p]||`<span
    class=\"te\">cat: ${esc(a.trim())}: No such file or directory</span>`;\n},\n\nhead:(a)=>{const
    p=a.trim().split(/\\s+/).filter(x=>!x.startsWith('-')).pop()||'';const fp=(p.startsWith('/')?p:cwd+'/'+p).replace(/\\/+/g,'/');const
    c=FC[fp];if(!c)return`<span class=\"te\">head: ${esc(p)}: No such file or directory</span>`;const
    n=parseInt((a.match(/-n\\s*(\\d+)/)||[,'5'])[1]);return c.split('\\n').slice(0,n).join('\\n');},\n\ntail:(a)=>{const
    p=a.trim().split(/\\s+/).filter(x=>!x.startsWith('-')).pop()||'';const fp=(p.startsWith('/')?p:cwd+'/'+p).replace(/\\/+/g,'/');const
    c=FC[fp];if(!c)return`<span class=\"te\">tail: ${esc(p)}: No such file or directory</span>`;const
    n=parseInt((a.match(/-n\\s*(\\d+)/)||[,'5'])[1]);const lines=c.split('\\n');return
    lines.slice(-n).join('\\n');},\n\n// ── Networking ──────────────────────────────────────────────\nip:(a)=>{\n
    \ if(a.match(/^a(ddr)?(\\s|$)/)||a===''||a==='-br')return`1: <span class=\"ts\">lo</span>:
    &lt;LOOPBACK,UP,LOWER_UP&gt; mtu 65536 state UNKNOWN\n    link/loopback 00:00:00:00:00:00\n
